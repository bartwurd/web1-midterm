<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="styles/styles.css" rel="stylesheet">
    <title>All Sorts of Stuff About Space!</title>
</head>
<body>
    <!-- the div class container tags allows the css document to grab everything within the div 
     container tag at once -->
    <div class="container">
        <header>
            <h1>
                SPACE STUFF!
            </h1>
        </header>

        <nav class="navbar">
        <!-- nav sections are for links. links are usually stored in lists-->
        <!-- ul tag denotes an unordered list. li tagged items are information on that list.-->
            <ul>
                <li><a href="index.html" class="navbutton">HOME</a></li>
                <li><a href="spacepeople.html" class="ctrnavbutton">SPACE PEOPLE</a></li>
                <li><a href="contact.html" class="navbutton">CONTACT</a></li>
            </ul>
        </nav>
        
            <article>
                <!-- articles should always contain a heading tag of some kind-->

                <h3>Contact to learn more</h3>

                <!-- html forms let users enter information into your site-->

                <!-- forms require two attributes to tell them how to submit: action tells the form where 
                to go (what page) 
                and method tells the form how to send the information 
                the post method sends the information in an encrypted package and 
                the get method sends the information unencrypted in the browser --> 

                <!-- div class info form allows me to grab the whole form in css -->

                <div class="infoform">
                <form action="contact.html" method="get">
                    <section>
                        <!-- a nested div with child classes-->
                        <div class="fillouts">
                        <!-- to link the label with the input, use 'for' on the lable matching the 'id' 
                         on the input -->
                         <label for="Name:">Your Name:</label>
                        <input type="Name:" id="text" name="name">

                        <!-- with input, you can specify different types -->
                        <label for="email">Your Email:</label>
                        <input type="email" id="email" name="email">

                        <label for="userMessage">Your Message:</label>

                        <textarea 
                            id="userMessage" 
                            name="message" 
                            rows="5" 
                            cols="40" 
                            placeholder="Type your message here...">
                        </textarea>
                        </div>
                        
                    </section>
                    <div class="radioform">
                    <section>
                            <h4>
                                How much do you want to go to space?
                            </h4>
                        <!-- radio buttons operate as a set - check one, and the others uncheck -->
                        <label for="alittle">A Little</label>
                        <input type="radio" name="spacebutton" id="alittle" value="A Little">

                        <label for="alot">A Lot</label>
                        <input type="radio" name="spacebutton" id="alot" value="A Lot">

                        <label for="morethananything">More Than Anything</label>
                        <input type="radio" name="spacebutton" id="morethananything" value=""More Than Anything">
                    </section>
                    </div>
                    <section>
                        <!-- to submit a form, add a submit button. This button will submit everything contained inside of one form tag -->
                         <!-- a class can be added to a button inside its input tag-->
                        <input type="submit" class="sendbutton" value="Send" name="submit">
                    </section>
                
                </form>
                </div>
                <footer>
                    <p>
                    &copy; 2026 SPAAAAAACE. All rights reserved.
                    </p> 
                </footer>
            </article>
            
            
        </article>
    </div>
</body>
</html>
